services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: website-app
    working_dir: /app/src
    env_file:
      - ./src/.env
    expose:
      - "8080"
    volumes:
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_volume:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
  db_volume:
  redis_volume: