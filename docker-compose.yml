services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: website-app
    working_dir: /app/src
    env_file:
      - ./src/.env
    expose:
      - "8080"
    volumes:
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    restart: always
    env_file:
      - ./src/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_volume:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
  db_volume:
  redis_volume: