{% extends "base/base_sign.html" %}
{% load static %}
{% load i18n %}

{% block title %}
    {% trans "Login" %}
{% endblock %}

{% block body %}

<div class="login-container max-w-sm mx-auto mt-10 bg-white p-6 rounded-lg shadow">

    <h1 class="text-xl font-semibold mb-6 text-center">
        {% trans "Login" %}
    </h1>

    <form method="post" novalidate class="space-y-4">
        {% csrf_token %}

        <!-- Phone Number -->
        <div class="form-group">
            <label for="id_phone_number" class="block text-sm mb-1">
                {% trans "Phone Number" %}
            </label>
            <input type="text" name="phone_number" id="id_phone_number"
                   value="{{ form.phone_number.value }}"
                   class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="id_password" class="block text-sm mb-1">
                {% trans "Password" %}
            </label>
            <input type="password" name="password" id="id_password"
                   class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
        </div>

        <!-- Remember Me -->
        <div class="form-group flex items-center gap-2">
            <input type="checkbox" name="remember_me" id="id_remember_me"
                   class="h-4 w-4 text-blue-600 border-gray-300 rounded">
            <label for="id_remember_me" class="text-sm">
                {% trans "Remember me" %}
            </label>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
            {% trans "Login" %}
        </button>

    </form>

    <p class="text-center text-sm mt-4">
        {% trans "Don't have an account?" %}
        <a href="{% url 'account:register' %}" class="text-blue-600 hover:underline">
            {% trans "Register" %}
        </a>
    </p>

    <p class="text-center text-sm mt-2">
        <a href="{% url 'account:get_phone_number' %}" class="text-blue-600 hover:underline">
            {% trans "Forget Password" %}
        </a>
    </p>

</div>

{% endblock %}
